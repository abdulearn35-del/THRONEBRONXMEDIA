<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THRONEBRONX AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0b0b0f; font-family:sans-serif; }
.glow {
  background: linear-gradient(90deg,#7c3aed,#06b6d4);
  -webkit-background-clip:text;
  color:transparent;
}
.card {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}
</style>
</head>

<body class="text-white">

<!-- HERO -->
<section class="text-center py-28 px-6">
<h1 class="text-5xl md:text-7xl font-bold mb-6">
THRONEBRONX <span class="glow">AI AGENCY</span>
</h1>

<p class="text-gray-400 mb-8">
We build AI systems that generate leads & revenue.
</p>

<button class="bg-gradient-to-r from-purple-600 to-cyan-500 px-8 py-4 rounded-xl">
Get Started
</button>
</section>

<!-- SERVICES -->
<section class="py-20 px-6 max-w-6xl mx-auto text-center">
<h2 class="text-3xl font-bold mb-10">Our Services</h2>

<div class="grid md:grid-cols-3 gap-8">

<div class="card p-6 rounded-xl">
<h3 class="text-xl font-bold mb-2">AI Chatbots</h3>
<p class="text-gray-400">Automate customer support & sales</p>
</div>

<div class="card p-6 rounded-xl">
<h3 class="text-xl font-bold mb-2">Paid Ads</h3>
<p class="text-gray-400">Meta & Google ads scaling</p>
</div>

<div class="card p-6 rounded-xl">
<h3 class="text-xl font-bold mb-2">Lead Generation</h3>
<p class="text-gray-400">High-quality client acquisition</p>
</div>

</div>
</section>

<!-- RESULTS -->
<section class="py-20 text-center">
<h2 class="text-3xl font-bold mb-6">Results</h2>
<p class="text-gray-400">We help clients grow 3X–5X 🚀</p>
</section>

<!-- CTA -->
<section class="py-20 text-center">
<h2 class="text-4xl font-bold mb-6">
Let’s Scale Your Business
</h2>

<button class="bg-purple-600 px-8 py-4 rounded-xl">
Contact Now
</button>
</section>

</body>
</html>
